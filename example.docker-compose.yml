# docker-compose.yml
services:
  web:
    image: githubyumao/mcsmanager-web:latest
    ports:
      - "23333:23333"
    restart: unless-stopped
    # If you want to run web via non-root user, uncomment the lines below and set PUID and PGID to your user and group ID
    # environment:
      # - PUID=1000
      # - PGID=1000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - <CHANGE_ME_TO_INSTALL_PATH>/web/data:/opt/mcsmanager/web/data
      - <CHANGE_ME_TO_INSTALL_PATH>/web/logs:/opt/mcsmanager/web/logs

  daemon:
    image: githubyumao/mcsmanager-daemon:latest
    restart: unless-stopped
    network_mode: host # if you want run instance in daemon container
    # ports:
    #   - "24444:24444"
    environment:
      - MCSM_DOCKER_WORKSPACE_PATH=<CHANGE_ME_TO_INSTALL_PATH>/daemon/data/InstanceData
      # Rootless Docker (Linux): set DOCKER_HOST to your user socket path
      # - DOCKER_HOST=unix:///run/user/1000/docker.sock
      # If you want to run daemon via non-root user, uncomment the lines below and set PUID and PGID to your user and group ID
      # - PUID=1000
      # - PGID=1000
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - <CHANGE_ME_TO_INSTALL_PATH>/daemon/data:/opt/mcsmanager/daemon/data
      - <CHANGE_ME_TO_INSTALL_PATH>/daemon/logs:/opt/mcsmanager/daemon/logs
      # Rootful Docker (default):
      - /var/run/docker.sock:/var/run/docker.sock
      # Rootless Docker (Linux): replace the line above with:
      # - /run/user/1000/docker.sock:/run/user/1000/docker.sock
